<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMA — Беспокрасочное удаление вмятин</title>
  <meta name="description" content="Переход к лендингу FORMA — студии беспокрасочного удаления вмятин (PDR) в Москве.">
  <meta http-equiv="refresh" content="0; url=./forma_landing_v3.html">
  <link rel="canonical" href="./forma_landing_v3.html">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --panel: #141414;
      --text: #f3ead9;
      --accent: #c9a96e;
      --border: rgba(201, 169, 110, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(201, 169, 110, 0.16), transparent 36%),
        linear-gradient(180deg, #111 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(20, 20, 20, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    p {
      margin: 0;
      line-height: 1.6;
      font-size: 1rem;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>FORMA</h1>
    <p>
      Если переход не произошёл автоматически, открой
      <a href="./forma_landing_v3.html">лендинг FORMA</a>.
    </p>
  </main>
  <script>
    window.location.replace("./forma_landing_v3.html");
  </script>

</html>
